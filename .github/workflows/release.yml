name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-binaries:
    name: build-release-binaries-${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: dx-linux-x86_64
            binary: dx
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            asset: dx-linux-arm64
            binary: dx
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-latest
            asset: dx-macos-x86_64
            binary: dx
            target: x86_64-apple-darwin
          - os: macos-latest
            asset: dx-macos-arm64
            binary: dx
            target: aarch64-apple-darwin
          - os: windows-latest
            asset: dx-windows-x86_64.exe
            binary: dx.exe
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Prepare release asset (unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: Prepare release asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -LiteralPath "target/${{ matrix.target }}/release/${{ matrix.binary }}" -Destination "${{ matrix.asset }}"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-release-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run release readiness checks
        run: scripts/check-release-readiness.sh

      - name: Download release asset artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create or update GitHub Release notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-assets/dx-linux-x86_64/dx-linux-x86_64
            release-assets/dx-linux-arm64/dx-linux-arm64
            release-assets/dx-macos-x86_64/dx-macos-x86_64
            release-assets/dx-macos-arm64/dx-macos-arm64
            release-assets/dx-windows-x86_64.exe/dx-windows-x86_64.exe

      - name: Dispatch tap-repo update event
        env:
          HOMEBREW_TAP_DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
        if: env.HOMEBREW_TAP_DISPATCH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          repository: nickcox/homebrew-dx
          event-type: dx-release-published
          client-payload: >-
            {"tag":"${{ github.ref_name }}"}
